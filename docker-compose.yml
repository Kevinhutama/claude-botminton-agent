services:
  # ── Bot Server ────────────────────────────────────────────
  # Polls Telegram Bot API and routes each message to a Claude CLI session.
  # Claude reads CLAUDE.md from its working dir (/app) for agent instructions.
  bot-server:
    build:
      context: ./bot-server
      dockerfile: Dockerfile
    container_name: claude-botminton-bot
    volumes:
      # Agent instructions — Claude reads this on every invocation
      - ./CLAUDE.md:/app/CLAUDE.md:ro
      # Persist Telegram→Claude session ID mapping across restarts
      - bot-sessions:/app/data
      # Mount host Claude config (auth token) into the container
      - ${HOME}/.claude.json:/home/botuser/.claude.json
      # Persist Claude's own conversation history across restarts
      - claude-home:/home/botuser/.claude
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # GrabGPT via local cc-grabgpt-proxy — must be running on host Mac at port 9898
      - CLAUDE_CODE_USE_BEDROCK=1
      - CLAUDE_CODE_SKIP_BEDROCK_AUTH=1
      - ANTHROPIC_BEDROCK_BASE_URL=http://host.docker.internal:9898/aws/v1
      - ANTHROPIC_DEFAULT_SONNET_MODEL=global.anthropic.claude-sonnet-4-5-20250929-v1:0
      - ANTHROPIC_DEFAULT_OPUS_MODEL=global.anthropic.claude-opus-4-5-20251101-v1:0
      - ANTHROPIC_DEFAULT_HAIKU_MODEL=global.anthropic.claude-haiku-4-5-20251001-v1:0
      - ANTHROPIC_SMALL_FAST_MODEL=global.anthropic.claude-haiku-4-5-20251001-v1:0
      - CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC=1
      - CLAUDE_CODE_ENABLE_TELEMETRY=0
      - CLAUDE_CODE_REMOTE=true
    env_file: .env
    networks:
      - clawnet
    restart: unless-stopped
    depends_on:
      - telethon-sidecar

  # ── Telethon Sidecar ─────────────────────────────────────
  # Uses your personal Telegram account (MTProto) to read groups that
  # block bots and to send DMs as you. REST API on port 8081.
  telethon-sidecar:
    build:
      context: ./telethon-sidecar
      dockerfile: Dockerfile
    container_name: claude-botminton-telethon
    volumes:
      # Persist Telethon login session across restarts
      - telethon-session:/app/session
      # Google Calendar OAuth credentials (credentials.json + token.json)
      - ./gcal:/app/gcal
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_PHONE=${TELEGRAM_PHONE}
    ports:
      # Exposed to localhost for auth and debugging
      - "8081:8081"
    networks:
      - clawnet
    restart: unless-stopped

volumes:
  bot-sessions:
    name: claude-botminton-sessions
  claude-home:
    name: claude-botminton-claude-home
  telethon-session:
    name: claude-botminton-telethon

networks:
  clawnet:
    driver: bridge
    name: claude-botminton-net
